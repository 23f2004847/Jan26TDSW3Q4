name: Daily Update by 23f2004847@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 AM UTC (pick any specific hour/minute, not "*")
  workflow_dispatch:      # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create daily file by 23f2004847@ds.study.iitm.ac.in
        run: |
          echo "Daily update: $(date)" > daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "23f2004847@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated update: $(date)"
          git push
